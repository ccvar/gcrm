name: CI

# 每次 push / PR：Go 服务端编译 + vet + 测试，Pilot 前端构建 + Rust 检查。
# Pilot 检查跑在 macOS runner 上（Linux 需要一堆 webkit 系统依赖，不值得）。
on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  server:
    name: Go 服务端
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: 编译
        run: go build ./...
      - name: go vet
        run: go vet ./...
      - name: 测试
        run: go test ./...

  pilot:
    name: Pilot 桌面端检查
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: 安装前端依赖
        run: npm ci
      - name: 前端构建
        run: npm run build
      - name: Rust 检查
        run: cargo check --manifest-path src-tauri/Cargo.toml
